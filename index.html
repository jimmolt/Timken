<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timken Bearing Database</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1.5rem; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 1.25rem; letter-spacing: -0.3px; }
  h1 span.tim { color: #f26522; }
  h1 span.ken { color: #1a1a1a; }
  .subtitle { display: none; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  input[type=text] { flex: 1; min-width: 180px; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background: #fff; }
  input[type=text]:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; min-width: 130px; }
  select:focus { outline: none; border-color: #4a90d9; }
  button { padding: 7px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
  button:hover { background: #f0f0f0; }
  .stats { font-size: 13px; color: #666; margin-bottom: 8px; }
  .tbl-wrap { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f8f8f8; padding: 9px 11px; text-align: left; font-weight: 600; font-size: 12px; color: #555; border-bottom: 1px solid #ddd; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { background: #efefef; color: #222; }
  th.sorted { color: #2563eb; }
  td { padding: 7px 11px; border-bottom: 1px solid #eee; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-cone { background: #dbeafe; color: #1e40af; }
  .badge-cup  { background: #dcfce7; color: #166534; }
  .no-results { text-align: center; padding: 2.5rem; color: #999; font-size: 14px; }
  .pg { display: flex; gap: 5px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .pg button { padding: 4px 10px; font-size: 12px; }
  .pg button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .pg-info { font-size: 12px; color: #888; margin-left: auto; }
  .double-tag { font-size: 11px; color: #92400e; background: #fef3c7; padding: 1px 6px; border-radius: 3px; }
  .inv-in  { font-size: 11px; font-weight: 700; color: #166534; background: #dcfce7; padding: 2px 8px; border-radius: 4px; }
  .inv-out { font-size: 11px; font-weight: 700; color: #991b1b; background: #fee2e2; padding: 2px 8px; border-radius: 4px; }
  .inv-bar { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding:10px 14px; background:#fff; border:1px solid #ddd; border-radius:8px; flex-wrap:wrap; }
  .inv-bar span { font-size:13px; color:#555; }
  .inv-bar strong { color:#1a1a1a; }
  .inv-btn { padding:6px 14px; font-size:13px; background:#f26522; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
  .inv-btn:hover { background:#d4541a; }
  .inv-status { font-size:12px; color:#888; margin-left:auto; }

  .inv-filter { display:flex; gap:6px; align-items:center; }
  select.inv-filter-sel { min-width:150px; }
</style>
</head>
<body>

<h1><span class="tim">TIMKEN Tapered Roller Bearing Database</span></h1>

<div class="controls">
  <input type="text" id="srch" placeholder="Search part number or sequence no…" oninput="render()">
  <select id="typeFilter" onchange="render()">
    <option value="">All types</option>
    <option value="Cone">Cone</option>
    <option value="Cup">Cup</option>
  </select>
  <select id="boreInFilter" onchange="render()">
    <option value="">All bore (inches)</option>
  </select>
  <div class="inv-filter">
    <select class="inv-filter-sel" id="stockFilter" onchange="render()">
      <option value="">All stock status</option>
      <option value="in">In Stock only</option>
      <option value="out">Out of Stock only</option>
      <option value="stocked">My inventory only</option>
    </select>
  </div>
  <button onclick="clearAll()">Clear filters</button>
  <button class="inv-btn" onclick="loadInventory()">🔄 Refresh Inventory</button>
</div>

<!-- INVENTORY STATUS BAR -->
<div class="inv-bar" id="invBar">
  <span id="invMsg">📦 <strong>Inventory not connected.</strong> See setup guide below.</span>
  <span class="inv-status" id="invStatus"></span>
</div>



<div class="stats" id="stats"></div>

<div class="tbl-wrap">
<table>
<thead>
<tr>
  <th onclick="sortBy('timken')" id="h-timken">Timken No. <span id="s-timken"></span></th>
  <th onclick="sortBy('type')" id="h-type">Type <span id="s-type"></span></th>
  <th onclick="sortBy('bore')" id="h-bore">Bore (in) <span id="s-bore"></span></th>
  <th onclick="sortBy('boreMM')" id="h-boreMM">Bore (mm) <span id="s-boreMM"></span></th>
  <th onclick="sortBy('od')" id="h-od">OD / Length (in) <span id="s-od"></span></th>
  <th onclick="sortBy('price')" id="h-price">Price <span id="s-price"></span></th>
  <th onclick="sortBy('qty')" id="h-qty">Stock <span id="s-qty"></span></th>
  <th>Notes</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div class="pg" id="pg"></div>
<div style="margin-top:16px;text-align:right;">
  <button id="priceToggleBtn" onclick="togglePrice()" style="background:transparent;border:none;color:#aaa;font-size:12px;padding:4px 8px;text-decoration:underline;cursor:pointer;">Hide Price</button>
</div>

  timken:r[0], type:r[1], seq:r[2],
  price:r[3], bore:r[4], boreMM:r[5], od:r[6], notes:r[7]
}));

let sortCol="timken", sortDir=1, page=0;
const PER=100;

const boreVals = [...new Set(data.map(d=>d.bore).filter(v=>v!=null))].sort((a,b)=>a-b);
const sel = document.getElementById('boreInFilter');
boreVals.forEach(v => {
  const o = document.createElement('option');

  o.textContent = v.toFixed(3) + '"';
  sel.appendChild(o);

// ============================================================
// INVENTORY — paste your Google Sheet CSV publish URL below
// ============================================================
const SHEET_URL = '';  // ← PASTE YOUR PUBLISHED CSV URL HERE

let inventory = {};
let invLoaded = false;

async function loadInventory() {
  if (!SHEET_URL) {
    document.getElementById('invMsg').innerHTML = '📦 <strong>Not connected.</strong> Follow the setup guide below to connect your Google Sheet.';
    return;
  }
  document.getElementById('invMsg').innerHTML = '🔄 <strong>Loading inventory…</strong>';
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent(SHEET_URL);
    const res = await fetch(url);
    if (!res.ok) throw new Error('Fetch failed');
    const csv = await res.text();
    const lines = csv.trim().split('\n').slice(1);
    inventory = {};
    let count = 0;
    lines.forEach(line => {
      const cols = line.split(',');
      const part = cols[0]?.trim().replace(/^"|"$/g,'');
      const qty  = parseInt(cols[1]?.trim().replace(/^"|"$/g,''), 10);
      if (part && !isNaN(qty)) { inventory[part] = qty; count++; }
    });
    invLoaded = true;
    data.forEach(d => {
      if (inventory.hasOwnProperty(d.timken)) d.qty = inventory[d.timken];
      else delete d.qty;
    });
    const inStock  = Object.values(inventory).filter(q=>q>0).length;
    const outStock = Object.values(inventory).filter(q=>q===0).length;
    document.getElementById('invMsg').innerHTML =
      '📦 <strong>'+count+' parts in your inventory</strong> &mdash; '+inStock+' in stock, '+outStock+' out of stock';
    document.getElementById('invStatus').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    document.getElementById('invMsg').innerHTML = '⚠️ <strong>Could not load inventory.</strong> Check your Sheet URL and make sure it is published as CSV.';
  }
}

if (SHEET_URL) loadInventory();

let showPrice = true;

function togglePrice(){
  showPrice = !showPrice;
  const btn = document.getElementById('priceToggleBtn');
  btn.textContent = showPrice ? 'Hide Price' : 'Show Price';
  const th = document.getElementById('h-price');
  if(th) th.style.display = showPrice ? '' : 'none';
  render();
}
  document.getElementById('srch').value='';
  document.getElementById('typeFilter').value='';
  document.getElementById('boreInFilter').value='';
  document.getElementById('stockFilter').value='';
  page=0; render();
}

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
  page=0; render();
}

function filtered(){
  const q=document.getElementById('srch').value.toLowerCase();
  const t=document.getElementById('typeFilter').value;
  const bi=document.getElementById('boreInFilter').value;
  const sf=document.getElementById('stockFilter').value;
  return data.filter(d=>{
    if(q && !d.timken.toLowerCase().includes(q) && !d.seq.toLowerCase().includes(q)) return false;
    if(t && d.type!==t) return false;
    if(bi && String(d.bore)!==bi) return false;
    if(sf==='in'      && !(d.qty > 0))       return false;
    if(sf==='out'     && !(d.qty === 0))      return false;
    if(sf==='stocked' && d.qty === undefined) return false;
    return true;
  }).sort((a,b)=>{
    let av=a[sortCol], bv=b[sortCol];
    if(av===null||av===undefined) av=sortDir>0?Infinity:-Infinity;
    if(bv===null||bv===undefined) bv=sortDir>0?Infinity:-Infinity;
    if(typeof av==='string') return av.localeCompare(bv)*sortDir;
    return (av-bv)*sortDir;
  });
}

function render(){
  const rows=filtered();
  const total=rows.length;
  const pages=Math.ceil(total/PER)||1;
  if(page>=pages) page=0;
  const slice=rows.slice(page*PER,page*PER+PER);

  document.getElementById('stats').textContent=
    total.toLocaleString()+' bearing'+(total!==1?'s':'')+' shown of '+data.length.toLocaleString();

  ['timken','type','price','bore','boreMM','od','qty'].forEach(c=>{
    const el=document.getElementById('s-'+c);
    if(el) el.textContent=sortCol===c?(sortDir>0?' ↑':' ↓'):'';
    const hel=document.getElementById('h-'+c);
    if(hel){ if(sortCol===c) hel.classList.add('sorted'); else hel.classList.remove('sorted'); }
  });

  const tbody=document.getElementById('tbody');
  if(!slice.length){
    tbody.innerHTML='<tr><td colspan="8" class="no-results">No bearings match your filters.</td></tr>';
  } else {
    tbody.innerHTML=slice.map(d=>{
      let stockCell='<td style="color:#ccc;font-size:12px">—</td>';
      if(d.qty !== undefined){
        if(d.qty > 0) stockCell=`<td><span class="inv-in">✓ ${d.qty} in stock</span></td>`;
        else stockCell=`<td><span class="inv-out">✗ Out of stock</span></td>`;
      }
      return `
      <tr>
        <td><strong>${d.timken}</strong></td>
        <td><span class="badge badge-${d.type.toLowerCase()}">${d.type}</span></td>
        <td>${d.bore!=null?d.bore.toFixed(3)+'"':'—'}</td>
        <td>${d.boreMM!=null?d.boreMM+' mm':'—'}</td>
        <td>${d.od!=null?d.od.toFixed(3)+'"':'—'}</td>
        ${showPrice?`<td>${d.price!=null?'$'+d.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'}</td>`:''}
        ${stockCell}
        <td>${d.notes?'<span class="double-tag">'+d.notes+'</span>':''}</td>
      </tr>`;
    }).join('');
  }

  const pgDiv=document.getElementById('pg');
  if(pages<=1){pgDiv.innerHTML='';return;}
  let btns='';
  const lo=Math.max(0,page-2),hi=Math.min(pages-1,page+2);
  if(lo>0) btns+=`<button onclick="goPage(0)">1</button>${lo>1?'<span style="padding:0 4px;color:#aaa">…</span>':''}`;
  for(let i=lo;i<=hi;i++) btns+=`<button class="${i===page?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
  if(hi<pages-1) btns+=`${hi<pages-2?'<span style="padding:0 4px;color:#aaa">…</span>':''}<button onclick="goPage(${pages-1})">${pages}</button>`;
  btns+=`<span class="pg-info">Page ${page+1} of ${pages} &mdash; ${total} results</span>`;
  pgDiv.innerHTML=btns;
}

function goPage(p){page=p;render();window.scrollTo(0,0);}
render();
